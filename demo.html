<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>2D Physics Engine Demo</title>
  <style>
    body {
      margin: 0;
      background: #0b0d12;
      color: #d7dbe2;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px;
    }
    h1 {
      font-size: 20px;
      margin: 0 0 4px;
    }
    p.subtitle {
      margin: 0 0 16px;
      color: #8b93a3;
      font-size: 14px;
    }
    #scene {
      background: #11151c;
      border: 1px solid #262b36;
      border-radius: 6px;
      cursor: crosshair;
    }
    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 18px;
      align-items: center;
      margin-top: 16px;
      max-width: 800px;
      justify-content: center;
    }
    .control {
      display: flex;
      flex-direction: column;
      font-size: 12px;
      color: #8b93a3;
    }
    .control span.value {
      color: #d7dbe2;
    }
    button {
      background: #1c2130;
      color: #d7dbe2;
      border: 1px solid #333a4a;
      border-radius: 4px;
      padding: 8px 14px;
      font-size: 13px;
      cursor: pointer;
    }
    button:hover {
      background: #262d40;
    }
    .stats {
      margin-top: 10px;
      font-size: 12px;
      color: #8b93a3;
    }
    code {
      color: #d7dbe2;
    }
  </style>
</head>
<body>
  <h1>2D Physics Engine — Demo</h1>
  <p class="subtitle">
    Click to drop a circle, shift + click to drop a box. Built with no dependencies on top of <code>physics.js</code>.
  </p>

  <canvas id="scene" width="800" height="500"></canvas>

  <div class="controls">
    <div class="control">
      Gravity (<span id="gravityLabel">500</span>)
      <input id="gravity" type="range" min="0" max="1500" step="10" value="500" />
    </div>
    <div class="control">
      New body restitution (<span id="restitutionLabel">0.5</span>)
      <input id="restitution" type="range" min="0" max="1" step="0.05" value="0.5" />
    </div>
    <div class="control">
      New body friction (<span id="frictionLabel">0.3</span>)
      <input id="friction" type="range" min="0" max="1" step="0.05" value="0.3" />
    </div>
    <button id="rainBtn">Drop 20 shapes</button>
    <button id="clearBtn">Clear</button>
  </div>

  <div class="stats">
    Dynamic bodies: <span id="bodyCount">0</span> &nbsp;|&nbsp; FPS: <span id="fps">0</span>
  </div>

  <script type="module" src="./demo.js"></script>
</body>
</html>
